version: 2

models:
  - name: stg_events
    description: "Staging model for events - user web activity and clickstream data"

    columns:
      - name: event_id
        data_type: int64
        description: "Unique identifier for each event"
        tests:
          - unique
          - not_null

      - name: user_id
        data_type: int64
        description: "Foreign key to users table"

      - name: sequence_number
        data_type: int64
        description: "Sequential number of event in session"
        tests:
          - not_null

      - name: session_id
        data_type: string
        description: "Unique identifier for user session"
        tests:
          - not_null

      - name: created_at
        data_type: timestamp
        description: "Timestamp when event occurred"

      - name: ip_address
        data_type: string
        description: "IP address of the user"

      - name: city
        data_type: string
        description: "City from which event originated"

      - name: state
        data_type: string
        description: "State from which event originated"

      - name: postal_code
        data_type: string
        description: "Postal code from which event originated"

      - name: browser
        data_type: string
        description: "Browser used for the event"

      - name: traffic_source
        data_type: string
        description: "Traffic source for the session"
        tests:
          - accepted_values:
              name: unexpected_traffic_source
              values:
                - Adwords
                - Organic
                - Facebook
                - Email
                - YouTube

      - name: uri
        data_type: string
        description: "URI/URL of the page"

      - name: event_type
        data_type: string
        description: "Type of event (product, cart, purchase, cancel, department, home)"
        tests:
          - accepted_values:
              name: unexpected_event_type
              values:
                - cancel
                - cart
                - department
                - home
                - purchase
                - product
