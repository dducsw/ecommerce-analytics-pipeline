version: 2

models:
  - name: stg_inventory_items
    description: "Staging model for inventory items - individual inventory units"
    columns:
      - name: inventory_item_id
        data_type: int64
        description: "Unique identifier for each inventory item"
        tests:
          - unique
          - not_null

      - name: product_id
        data_type: int64
        description: "Foreign key to products table"
        tests:
          - not_null

      - name: created_at
        data_type: timestamp
        description: "Timestamp when inventory item was received/created"

      - name: sold_at
        data_type: timestamp
        description: "Timestamp when inventory item was sold (null if not sold)"

      - name: cost
        data_type: float64
        description: "Cost of this specific inventory item"

      - name: product_category
        data_type: string
        description: "Category of the product (denormalized)"

      - name: product_name
        data_type: string
        description: "Name of the product (denormalized)"

      - name: product_brand
        data_type: string
        description: "Brand of the product (denormalized)"

      - name: product_retail_price
        data_type: float64
        description: "Retail price of the product (denormalized)"

      - name: product_department
        data_type: string
        description: "Department of the product (denormalized)"

      - name: product_sku
        data_type: string
        description: "SKU of the product (denormalized)"

      - name: product_distribution_center_id
        data_type: int64
        description: "Distribution center ID of the product (denormalized)"
