version: 2

models:
  - name: stg_order_items
    description: "Staging model for order items - line item details of orders"

    columns:
      - name: order_item_id
        data_type: int64
        description: "Unique identifier for each order item"
        tests:
          - unique
          - not_null

      - name: order_id
        data_type: int64
        description: "Foreign key to orders table"
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id

      - name: user_id
        data_type: int64
        description: "Foreign key to users table"
        tests:
          - not_null

      - name: product_id
        data_type: int64
        description: "Foreign key to products table"
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id

      - name: inventory_item_id
        data_type: int64
        description: "Foreign key to inventory_items table"

      - name: status
        data_type: string
        description: "Status of the order item (Complete, Cancelled, Returned, etc.)"

      - name: created_at
        data_type: timestamp
        description: "Timestamp when order item was created"

      - name: updated_at
        data_type: timestamp
        description: "Timestamp when order item was last updated"

      - name: shipped_at
        data_type: timestamp
        description: "Timestamp when order item was shipped"

      - name: delivered_at
        data_type: timestamp
        description: "Timestamp when order item was delivered"

      - name: returned_at
        data_type: timestamp
        description: "Timestamp when order item was returned (null if not returned)"

      - name: sale_price
        data_type: float64
        description: "Actual sale price of the item (after discounts)"
