name: 'ecommerce_analytics'
version: '1.0.0'
config-version: 2

# Project profile configuration
profile: 'ecommerce_analytics'

# Directory configurations
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Output directory for compiled SQL
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Model configurations
models:
  ecommerce_analytics:
    # Staging models
    staging:
      +materialized: view
      +schema: staging
    
    # Intermediate models
    intermediate:
      +materialized: view
      +schema: intermediate
    
    # Mart models (final analytical tables)
    marts:
      +materialized: table
      +schema: marts

# Seed configurations
seeds:
  ecommerce_analytics:
    +schema: raw
    +quote_columns: false

# Snapshot configurations
snapshots:
  ecommerce_analytics:
    +target_schema: snapshots
    +strategy: timestamp
    +unique_key: id

# Test configurations
tests:
  ecommerce_analytics:
    +store_failures: true
    +schema: test_results

# Documentation
docs-paths: ["docs"]
