name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f airflow/requirements.txt ]; then pip install -r airflow/requirements.txt; fi

      - name: Lint with Black
        run: black --check .

      - name: Lint with Flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.venv,.git

      - name: Run Airflow DAG validation
        run: |
          export AIRFLOW_HOME=$(pwd)/airflow
          pytest tests/test_dag_integrity.py

  dbt-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: dbt Deps & Compile
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          cd dbt
          # Create a dummy profiles.yml if GCP_SA_KEY is missing for PRs from forks
          if [ -z "$GCP_SA_KEY" ]; then
            echo "Skipping dbt compile as GCP_SA_KEY is not set"
          else
            echo "$GCP_SA_KEY" > sa_key.json
            dbt deps
            dbt compile --profiles-dir . --target dev
          fi

  docker-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfiles (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "airflow/Dockerfile"

      - name: Build Airflow Image
        run: docker build -t airflow-ci -f airflow/Dockerfile airflow/

      - name: Build Datagen Image
        run: docker build -t datagen-ci -f datagen/thelook-ecomm/Dockerfile datagen/thelook-ecomm/
