name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.4.2 flake8 pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f airflow/requirements.txt ]; then pip install -r airflow/requirements.txt; fi

      - name: Lint with Black
        run: black --check .

      - name: Lint with Flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.venv,.git

      - name: Create dbt manifest stub for CI
        run: |
          mkdir -p dbt/target
          cat > dbt/target/manifest.json <<'EOF'
          {"metadata": {"dbt_schema_version": "https://schemas.getdbt.com/dbt/manifest/v12/manifest.json", "dbt_version": "1.8.0", "generated_at": "2026-01-01T00:00:00.000000Z", "invocation_id": "ci-stub", "env": {}}, "nodes": {}, "sources": {}, "exposures": {}, "metrics": {}, "selectors": {}, "parent_map": {}, "child_map": {}, "group_map": {}, "semantic_models": {}, "unit_tests": {}}
          EOF

      - name: Run Airflow DAG validation
        run: |
          export AIRFLOW_HOME=$(pwd)/airflow
          export DBT_PROJECT_DIR=$(pwd)/dbt
          pytest tests/test_dag_integrity.py

  dbt-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: dbt Deps & Compile
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          cd dbt
          # Create a dummy profiles.yml if GCP_SA_KEY is missing for PRs from forks
          if [ -z "$GCP_SA_KEY" ]; then
            echo "Skipping dbt compile as GCP_SA_KEY is not set"
          else
            echo "$GCP_SA_KEY" > sa_key.json
            dbt deps
            dbt compile --profiles-dir . --target dev
          fi

